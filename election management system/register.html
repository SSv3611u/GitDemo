  <div class="container">
    <h1>User Registration</h1>

    <form>
      <label>Full Name</label>
      <input type="text" placeholder="Enter your full name" required>

      <label>Flat / House Number</label>
      <input type="text" placeholder="e.g. A-101" required>

      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Mobile Number</label>
      <input type="tel" placeholder="Enter mobile number" required>

      <label>Password</label>
      <input type="password" placeholder="Enter password" required>

      <label>Confirm Password</label>
      <input type="password" placeholder="Confirm password" required>

      <label>Resident Type</label><br>
      <input type="radio" name="resident" value="owner"> Owner
      <input type="radio" name="resident" value="tenant"> Tenant
      <br><br>

      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>
